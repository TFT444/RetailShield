<svg width="680" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<title>RetailShield animated system flow</title>
<desc>Animated end-to-end flow from retail data sources through Microsoft Sentinel detection to automated response and UK compliance output</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <clipPath id="retail-clip"><rect x="36" y="278" width="294" height="148" rx="8"/></clipPath>
  <clipPath id="generic-clip"><rect x="350" y="278" width="294" height="148" rx="8"/></clipPath>
</defs>

<style>
  @keyframes flow-down  { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
  @keyframes flow-right { from { stroke-dashoffset: 16; } to { stroke-dashoffset: 0; } }
  @keyframes fade-in-1  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fade-in-2  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fade-in-3  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fade-in-4  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fade-in-5  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fade-in-6  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fade-in-7  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse-border { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes sentinel-glow { 0%,100% { opacity: 0.1; } 50% { opacity: 0.4; } }
  @keyframes scan-red  { 0% { transform: translateY(0);   opacity: 0.7; } 100% { transform: translateY(148px); opacity: 0; } }
  @keyframes scan-blue { 0% { transform: translateY(0);   opacity: 0.6; } 100% { transform: translateY(148px); opacity: 0; } }
  @keyframes blink     { 0%,100% { opacity: 1; } 50% { opacity: 0.1; } }
  @keyframes contain-flash { 0%,100% { opacity: 0; } 15%,35% { opacity: 0.25; } }
  @keyframes ticker    { 0% { opacity: 0.2; } 33% { opacity: 1; } 66% { opacity: 0.5; } 100% { opacity: 0.2; } }
  .L1 { animation: fade-in-1 0.5s ease-out 0.1s both; }
  .L2 { animation: fade-in-2 0.5s ease-out 0.5s both; }
  .L3 { animation: fade-in-3 0.5s ease-out 0.9s both; }
  .L4 { animation: fade-in-4 0.5s ease-out 1.3s both; }
  .L5 { animation: fade-in-5 0.5s ease-out 1.7s both; }
  .L6 { animation: fade-in-6 0.5s ease-out 2.1s both; }
  .L7 { animation: fade-in-7 0.5s ease-out 2.5s both; }
  .sv  { stroke-dasharray: 4 4; animation: flow-down  0.55s linear infinite; }
  .sh  { stroke-dasharray: 4 4; animation: flow-right 0.45s linear infinite; }
  .pulse   { animation: pulse-border   2s   ease-in-out infinite; }
  .sglow   { animation: sentinel-glow  2.8s ease-in-out infinite; }
  .scan-r  { animation: scan-red  2.2s linear infinite; }
  .scan-b  { animation: scan-blue 2.2s linear infinite 1.1s; }
  .blink   { animation: blink 1.3s ease-in-out infinite; }
  .blink2  { animation: blink 1.3s ease-in-out infinite 0.65s; }
  .cflash  { animation: contain-flash 3.2s ease-in-out infinite; }
  .tick1   { animation: ticker 2s ease-in-out infinite 0s; }
  .tick2   { animation: ticker 2s ease-in-out infinite 0.66s; }
  .tick3   { animation: ticker 2s ease-in-out infinite 1.32s; }
</style>

<!-- Title -->
<text x="340" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">RetailShield — system flow</text>
<text x="340" y="44" text-anchor="middle" font-size="11" fill="#64748b">Retail data → Microsoft Sentinel detection → automated response → UK compliance</text>

<!-- LAYER 1: DATA SOURCES -->
<g class="L1">
  <text x="340" y="70" text-anchor="middle" font-size="10" fill="#94a3b8">DATA SOURCES</text>
  <rect x="36"  y="78" width="110" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="91"  y="99"  text-anchor="middle" font-size="11" font-weight="500" fill="#085041">POS / till</text>
  <text x="91"  y="115" text-anchor="middle" font-size="9"  fill="#0F6E56">transactions, voids</text>
  <rect x="156" y="78" width="110" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="211" y="99"  text-anchor="middle" font-size="11" font-weight="500" fill="#085041">Identity</text>
  <text x="211" y="115" text-anchor="middle" font-size="9"  fill="#0F6E56">Azure AD, MFA, roles</text>
  <rect x="276" y="78" width="110" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="331" y="99"  text-anchor="middle" font-size="11" font-weight="500" fill="#085041">Email / M365</text>
  <text x="331" y="115" text-anchor="middle" font-size="9"  fill="#0F6E56">phishing, file access</text>
  <rect x="396" y="78" width="110" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="451" y="99"  text-anchor="middle" font-size="11" font-weight="500" fill="#085041">Network</text>
  <text x="451" y="115" text-anchor="middle" font-size="9"  fill="#0F6E56">firewall, DNS, TLS</text>
  <rect x="516" y="78" width="128" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="580" y="99"  text-anchor="middle" font-size="11" font-weight="500" fill="#085041">Suppliers</text>
  <text x="580" y="115" text-anchor="middle" font-size="9"  fill="#0F6E56">B2B, invoices</text>
  <line x1="91"  y1="128" x2="91"  y2="162" class="sv" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <line x1="211" y1="128" x2="211" y2="162" class="sv" stroke="#0F6E56" stroke-width="1.2" style="animation-delay:.1s" marker-end="url(#arr-green)"/>
  <line x1="331" y1="128" x2="331" y2="162" class="sv" stroke="#0F6E56" stroke-width="1.2" style="animation-delay:.2s" marker-end="url(#arr-green)"/>
  <line x1="451" y1="128" x2="451" y2="162" class="sv" stroke="#0F6E56" stroke-width="1.2" style="animation-delay:.3s" marker-end="url(#arr-green)"/>
  <line x1="580" y1="128" x2="580" y2="162" class="sv" stroke="#0F6E56" stroke-width="1.2" style="animation-delay:.4s" marker-end="url(#arr-green)"/>
  <text x="340" y="160" text-anchor="middle" font-size="9" fill="#94a3b8">HMAC-SHA256 signed ingestion</text>
</g>

<!-- LAYER 2: INGESTION -->
<g class="L2">
  <line x1="340" y1="164" x2="340" y2="182" class="sv" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <rect x="56"  y="183" width="568" height="56" rx="10" fill="#185FA5" class="sglow"/>
  <rect x="58"  y="185" width="564" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="340" y="207" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">Microsoft Sentinel — Log Analytics workspace</text>
  <text x="340" y="225" text-anchor="middle" font-size="9"  fill="#185FA5">SigninLogs · SecurityEvent · OfficeActivity · CommonSecurityLog · RetailShield_Logs_CL</text>
  <line x1="340" y1="237" x2="340" y2="257" class="sv" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="340" y="267" text-anchor="middle" font-size="9" fill="#94a3b8">DETECTION — 20 KQL rules mapped to MITRE ATT&amp;CK</text>
</g>

<!-- LAYER 3: DETECTION -->
<g class="L3">
  <rect x="36"  y="275" width="294" height="150" rx="8" fill="#FFF0F0" stroke="#C0392B" stroke-width="0.8"/>
  <text x="183" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#A32D2D">Retail-specific (14)</text>
  <text x="183" y="315" text-anchor="middle" font-size="9" fill="#7f1d1d">Gift-card fraud · POS void / refund</text>
  <text x="183" y="331" text-anchor="middle" font-size="9" fill="#7f1d1d">Credential stuffing · MFA fatigue</text>
  <text x="183" y="347" text-anchor="middle" font-size="9" fill="#7f1d1d">Phishing · Ransomware · Data exfil</text>
  <text x="183" y="363" text-anchor="middle" font-size="9" fill="#7f1d1d">AI voice fraud · POS anomaly</text>
  <text x="183" y="379" text-anchor="middle" font-size="9" fill="#7f1d1d">Supplier compromise · TLS downgrade</text>
  <text x="183" y="395" text-anchor="middle" font-size="9" fill="#7f1d1d">After-hours · Impossible travel</text>
  <rect x="36"  y="275" width="294" height="2" fill="#C0392B" opacity="0.6" clip-path="url(#retail-clip)" class="scan-r"/>
  <rect x="350" y="275" width="294" height="150" rx="8" fill="#EFF6FF" stroke="#185FA5" stroke-width="0.8"/>
  <text x="497" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#185FA5">Generic SOC (6)</text>
  <text x="497" y="321" text-anchor="middle" font-size="9" fill="#1e3a5f">Brute force login</text>
  <text x="497" y="339" text-anchor="middle" font-size="9" fill="#1e3a5f">Bulk file access</text>
  <text x="497" y="357" text-anchor="middle" font-size="9" fill="#1e3a5f">C2 beacon · DNS exfil</text>
  <text x="497" y="375" text-anchor="middle" font-size="9" fill="#1e3a5f">RDP lateral movement</text>
  <text x="497" y="393" text-anchor="middle" font-size="9" fill="#1e3a5f">Suspicious PowerShell</text>
  <rect x="350" y="275" width="294" height="2" fill="#185FA5" opacity="0.5" clip-path="url(#generic-clip)" class="scan-b"/>
  <line x1="340" y1="425" x2="340" y2="445" class="sv" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr)"/>
</g>

<!-- LAYER 4: INCIDENT ENGINE -->
<g class="L4">
  <rect x="132" y="443" width="416" height="56" rx="10" fill="#534AB7" class="pulse"/>
  <rect x="134" y="445" width="412" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="340" y="467" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Sentinel incident engine</text>
  <text x="340" y="485" text-anchor="middle" font-size="9"  fill="#534AB7">correlates alerts → incident (IP · account · host · severity)</text>
  <circle cx="154" cy="471" r="4" fill="#C0392B" class="blink"/>
  <circle cx="165" cy="471" r="4" fill="#E67E22" class="blink2"/>
  <circle cx="515" cy="471" r="4" fill="#C0392B" class="blink2"/>
  <circle cx="526" cy="471" r="4" fill="#E67E22" class="blink"/>
  <line x1="340" y1="497" x2="340" y2="517" class="sv" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="340" y="527" text-anchor="middle" font-size="9" fill="#94a3b8">AUTOMATED RESPONSE — 8 LOGIC APP PLAYBOOKS</text>
</g>

<!-- LAYER 5: RESPONSE -->
<g class="L5">
  <rect x="36"  y="533" width="186" height="90" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="129" y="553" text-anchor="middle" font-size="11" font-weight="600" fill="#633806">Step 1 — Triage</text>
  <text x="129" y="571" text-anchor="middle" font-size="9"  fill="#854F0B">classify + set severity</text>
  <text x="129" y="587" text-anchor="middle" font-size="9"  fill="#854F0B">VirusTotal · AbuseIPDB</text>
  <text x="129" y="603" text-anchor="middle" font-size="9"  fill="#854F0B">threat-intel enrichment</text>
  <circle cx="60"  cy="617" r="3" fill="#854F0B" class="tick1"/>
  <circle cx="72"  cy="617" r="3" fill="#854F0B" class="tick2"/>
  <circle cx="84"  cy="617" r="3" fill="#854F0B" class="tick3"/>
  <line x1="222" y1="578" x2="246" y2="578" class="sh" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr-amber)"/>
  <rect x="244" y="531" width="192" height="92" rx="10" fill="#C0392B" class="cflash"/>
  <rect x="246" y="533" width="188" height="88" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="340" y="553" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">Step 2 — Contain</text>
  <text x="340" y="571" text-anchor="middle" font-size="9"  fill="#993C1D">block IP via NSG</text>
  <text x="340" y="587" text-anchor="middle" font-size="9"  fill="#993C1D">disable AD account</text>
  <text x="340" y="603" text-anchor="middle" font-size="9"  fill="#993C1D">isolate host (Defender)</text>
  <line x1="434" y1="578" x2="458" y2="578" class="sh" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <rect x="460" y="533" width="184" height="88" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="552" y="553" text-anchor="middle" font-size="11" font-weight="600" fill="#27500A">Step 3 — Comply</text>
  <text x="552" y="571" text-anchor="middle" font-size="9"  fill="#3B6D11">NCSC 24h deadline</text>
  <text x="552" y="587" text-anchor="middle" font-size="9"  fill="#3B6D11">ICO 72h deadline</text>
  <text x="552" y="603" text-anchor="middle" font-size="9"  fill="#3B6D11">drafts incident report</text>
  <text x="552" y="619" text-anchor="middle" font-size="9"  fill="#3B6D11">assists human, never auto-files</text>
  <line x1="340" y1="623" x2="340" y2="643" class="sv" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
</g>

<!-- LAYER 6: DASHBOARD + MODULES -->
<g class="L6">
  <rect x="36"  y="645" width="608" height="52" rx="8" fill="#F8F7F4" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="340" y="667" text-anchor="middle" font-size="12" font-weight="500" fill="#444441">SOC portal dashboard</text>
  <text x="340" y="683" text-anchor="middle" font-size="9"  fill="#5F5E5A">real-time threat feed · incident timeline · KPI metrics · one-click simulation</text>
  <line x1="340" y1="697" x2="340" y2="715" class="sv" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="340" y="725" text-anchor="middle" font-size="9" fill="#94a3b8">MODULES</text>
  <rect x="36"  y="731" width="176" height="46" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="124" y="751" text-anchor="middle" font-size="11" font-weight="500" fill="#0C447C">Threat detection</text>
  <text x="124" y="767" text-anchor="middle" font-size="9"  fill="#185FA5">LIVE — 19 rules</text>
  <rect x="224" y="731" width="176" height="46" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="312" y="751" text-anchor="middle" font-size="11" font-weight="500" fill="#0C447C">Compliance centre</text>
  <text x="312" y="767" text-anchor="middle" font-size="9"  fill="#185FA5">LIVE — UK deadlines</text>
  <rect x="412" y="731" width="232" height="46" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="528" y="751" text-anchor="middle" font-size="11" font-weight="500" fill="#0C447C">Vulnerability scanner</text>
  <text x="528" y="767" text-anchor="middle" font-size="9"  fill="#185FA5">LIVE — passive + human review</text>
  <rect x="36"  y="787" width="176" height="42" rx="6" fill="#F8F7F4" stroke="#B4B2A9" stroke-width="0.6" stroke-dasharray="4 3"/>
  <text x="124" y="807" text-anchor="middle" font-size="11" font-weight="500" fill="#5F5E5A">Loss prevention</text>
  <text x="124" y="821" text-anchor="middle" font-size="9"  fill="#94a3b8">planned</text>
  <rect x="224" y="787" width="176" height="42" rx="6" fill="#F8F7F4" stroke="#B4B2A9" stroke-width="0.6" stroke-dasharray="4 3"/>
  <text x="312" y="807" text-anchor="middle" font-size="11" font-weight="500" fill="#5F5E5A">ChainShield</text>
  <text x="312" y="821" text-anchor="middle" font-size="9"  fill="#94a3b8">planned</text>
  <line x1="340" y1="839" x2="340" y2="859" class="sv" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
</g>

<!-- LAYER 7: ANALYST OUTPUT -->
<g class="L7">
  <rect x="100" y="861" width="480" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="340" y="883" text-anchor="middle" font-size="13" font-weight="600" fill="#27500A">Analyst — threat already contained</text>
  <text x="340" y="899" text-anchor="middle" font-size="9"  fill="#3B6D11">enriched incident · compliance clock running · report drafted</text>
  <rect x="488" y="920" width="156" height="28" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="566" y="938" text-anchor="middle" font-size="10" font-weight="500" fill="#3C3489">avg ~22 min MTTD</text>
  <text x="340" y="962" text-anchor="middle" font-size="9" fill="#94a3b8">Validated in a controlled lab · DOI 10.5281/zenodo.20608262</text>
  <text x="340" y="978" text-anchor="middle" font-size="9" fill="#94a3b8">Sentinel-native content pack — not a standalone SIEM · ShieldTech Ltd, London</text>
</g>

</svg>
